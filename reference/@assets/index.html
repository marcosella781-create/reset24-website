<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Crealoo - Premium Pre-Workout</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Referência ao Design System -->
    <!-- Reutilizando o que já existe no design_system.html (tipografia, espaçamentos, css base) -->
    <link href="assets/css_a942cf029a8f.css" media="all" rel="stylesheet" />
    <link href="assets/reset_4101c8f6e61b.css" media="all" rel="stylesheet" />
    <link href="assets/theme_114ac8da3d3a.css" media="all" rel="stylesheet" />
    <link href="assets/header-footer_a46cd7ee2695.css" media="all" rel="stylesheet" />
    <link href="assets/custom-frontend_7c7b288e09ea.css" media="all" rel="stylesheet" />

    <!-- CSS Complementar para a seção HERO -->
    <style>
        :root {
            /* Identidade Visual - Amarelo energia/performance */
            --color-primary: #FFBC00;
            --color-primary-hover: #E6A900;
            --color-bg-dark: #0a0a0c;
            --color-bg-surface: rgba(255, 255, 255, 0.03);
            --color-text-light: #ffffff;
            --color-text-muted: #a0a0ab;
            --color-border: rgba(255, 255, 255, 0.08);

            --font-heading: 'Outfit', 'Inter', sans-serif;
            --font-body: 'Inter', sans-serif;

            --spacing-sm: 0.5rem;
            --spacing-md: 1rem;
            --spacing-lg: 2rem;
            --spacing-xl: 4rem;

            --transition-smooth: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            --transition-fast: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--color-bg-dark);
            color: var(--color-text-light);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            /* Altura estendida para permitir o scroll effect no desktop */
            height: 300vh;
        }

        /* Container Fixo do Hero */
        .hero-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Vídeo Background (Scroll-driven) */
        .video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0.35;
            /* Fundo sofisticado */
            filter: contrast(1.1) brightness(0.8);
            transition: opacity 0.5s ease;
        }

        /* Overlay para legibilidade e sensação premium */
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                    rgba(10, 10, 12, 0.95) 0%,
                    rgba(10, 10, 12, 0.7) 40%,
                    rgba(10, 10, 12, 0.1) 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* Estrutura Grid (Layout horizontalmente dividido) */
        .hero-content {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1440px;
            padding: 0 5%;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: var(--spacing-xl);
            align-items: center;
        }

        /* Esquerda: Texto e Botões */
        .hero-text-wrapper {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-lg);
        }

        .hero-eyebrow {
            font-family: var(--font-heading);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--color-primary);
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
            transform: translateY(20px);
        }

        /* Micro detalhe: linha sutil */
        .hero-eyebrow::before {
            content: '';
            width: 40px;
            height: 1px;
            background-color: var(--color-primary);
            box-shadow: 0 0 8px rgba(255, 188, 0, 0.5);
            /* Glow leve */
        }

        /* Tipografia grande e impactante */
        .hero-headline {
            font-family: var(--font-heading);
            font-size: clamp(3rem, 5vw, 5.5rem);
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -0.02em;
            color: var(--color-text-light);
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateY(30px);
        }

        .hero-headline span {
            color: var(--color-primary);
            position: relative;
            display: inline-block;
        }

        /* Subheadline curta */
        .hero-subheadline {
            font-size: clamp(1.125rem, 1.5vw, 1.25rem);
            line-height: 1.6;
            font-weight: 300;
            color: var(--color-text-muted);
            max-width: 500px;
            opacity: 0;
            transform: translateY(20px);
        }

        .hero-buttons {
            display: flex;
            gap: 20px;
            margin-top: var(--spacing-sm);
            opacity: 0;
            transform: translateY(20px);
        }

        /* Botões padronizados e premium */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 36px;
            font-family: var(--font-heading);
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-decoration: none;
            border-radius: 100px;
            /* Consistente c/ design moderno */
            transition: var(--transition-fast);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        /* Primário (amarelo) */
        .btn-primary {
            background-color: var(--color-primary);
            color: #000;
            box-shadow: 0 4px 15px rgba(255, 188, 0, 0.2);
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.5s ease;
        }

        /* Hover sofisticado (microinteração) */
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 188, 0, 0.4);
            background-color: var(--color-primary-hover);
        }

        .btn-primary:hover::after {
            left: 100%;
        }

        /* Secundário (outline/neutro) */
        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.03);
            /* Blur de fundo discreto */
            color: var(--color-text-light);
            border: 1px solid var(--color-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Direita: Área visual para produto */
        .hero-visual {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        /* Glow leve e Blur de fundo discreto */
        .hero-visual-glow {
            position: absolute;
            width: 80%;
            padding-bottom: 80%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 188, 0, 0.15) 0%, rgba(255, 188, 0, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            filter: blur(40px);
            animation: pulse-glow 4s infinite alternate cubic-bezier(0.25, 1, 0.5, 1);
        }

        @keyframes pulse-glow {
            0% {
                opacity: 0.6;
                transform: translate(-50%, -50%) scale(0.95);
            }

            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.05);
            }
        }

        /* Produto Flutuante */
        .hero-product-img {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 450px;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.6));
            opacity: 0;
            transform: translateY(40px) scale(0.95);
        }

        .product-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-15px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        /* Navegação e Logo Premium (Link para Design System) */
        .premium-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .brand-logo {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            color: #fff;
            text-decoration: none;
        }

        .ds-link {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--color-primary);
            text-decoration: none;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            position: relative;
            padding: 8px 16px;
            border: 1px solid var(--color-primary);
            border-radius: 100px;
            transition: var(--transition-fast);
        }

        .ds-link:hover {
            background-color: var(--color-primary);
            color: #000;
        }

        /* Indicador de Scroll */
        .scroll-indicator {
            position: fixed;
            bottom: 40px;
            left: 5%;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transition: opacity 1s ease 1.5s;
        }

        .scroll-indicator.visible {
            opacity: 1;
        }

        .scroll-text {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.5);
            writing-mode: vertical-lr;
        }

        .scroll-line {
            width: 1px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .scroll-line::after {
            content: '';
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--color-primary);
            animation: scrollDown 2s cubic-bezier(0.77, 0, 0.175, 1) infinite;
        }

        @keyframes scrollDown {
            0% {
                top: -100%;
            }

            50% {
                top: 100%;
            }

            100% {
                top: 100%;
            }
        }

        /* Mobile */
        @media (max-width: 991px) {
            .hero-content {
                grid-template-columns: 1fr;
                text-align: center;
                gap: var(--spacing-lg);
                padding-top: 80px;
            }

            .hero-eyebrow {
                justify-content: center;
            }

            .hero-eyebrow::before,
            .hero-eyebrow::after {
                content: '';
                width: 30px;
                height: 1px;
                background-color: var(--color-primary);
            }

            .hero-buttons {
                justify-content: center;
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .hero-overlay {
                background: linear-gradient(180deg,
                        rgba(10, 10, 12, 0.95) 0%,
                        rgba(10, 10, 12, 0.7) 40%,
                        rgba(10, 10, 12, 0.3) 100%);
            }

            .hero-visual {
                order: -1;
                height: 35vh;
            }

            .hero-product-img {
                max-width: 250px;
            }

            body.is-mobile {
                height: 100vh;
                overflow: hidden;
            }

            .hero-container.is-mobile {
                position: relative;
                height: 100vh;
                align-items: flex-start;
            }

            .premium-header {
                padding: 20px 5%;
            }
        }
    </style>
</head>

<body>

    <header class="premium-header">
        <a href="#" class="brand-logo">CREALOO</a>
        <a href="design-system.html" class="ds-link">Design System</a>
    </header>

    <main class="hero-container" id="heroContainer">
        <!-- Vídeo Background - Apple Scroll-Driven Effect -->
        <video id="heroVideo" class="video-background" src="../assets/video arrumado.mp4" playsinline muted
            preload="auto">
        </video>

        <div class="hero-overlay"></div>

        <div class="hero-content">
            <!-- Esquerda: Informações e CTA -->
            <div class="hero-text-wrapper">
                <div class="hero-eyebrow gsap-reveal">Performance Feminina</div>
                <h1 class="hero-headline gsap-reveal">
                    Energia que <br><span>transforma.</span>
                </h1>
                <p class="hero-subheadline gsap-reveal">
                    Sabor nostálgico, ativos coreanos e a definição premium que você merece. O pré-treino definitivo
                    para a mulher moderna.
                </p>
                <div class="hero-buttons gsap-reveal">
                    <a href="#comprar" class="btn btn-primary">Garantir o meu</a>
                    <a href="#saibamais" class="btn btn-secondary">Descobrir fórmula</a>
                </div>
            </div>

            <!-- Direita: Área do Produto c/ placeholder -->
            <div class="hero-visual">
                <div class="hero-visual-glow"></div>
                <!-- Imagem Placeholder do produto -->
                <img id="productImage" src="produto.png" alt="Crealoo Pre-Treino Premium" class="hero-product-img"
                    onerror="this.src='https://placehold.co/400x500/1a1a1c/FFBC00?text=Crealoo+Produto&font=Montserrat'">
            </div>
        </div>
    </main>

    <!-- Indicador de Status Scroll -->
    <div class="scroll-indicator" id="scrollIndicator">
        <span class="scroll-text">Scroll</span>
        <div class="scroll-line"></div>
    </div>

    <!-- GSAP + ScrollTrigger (Apenas as dependências necessárias de animação premium) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        // Registrando GSAP Plugins
        gsap.registerPlugin(ScrollTrigger);

        document.addEventListener("DOMContentLoaded", () => {
            const video = document.getElementById('heroVideo');
            const isMobile = window.innerWidth <= 991;

            // Tratamento Mobile (Autoplay muted loop p/ performance)
            if (isMobile) {
                document.body.classList.add('is-mobile');
                document.getElementById('heroContainer').classList.add('is-mobile');
                video.autoplay = true;
                video.loop = true;
                video.play().catch(e => console.error('Erro autoplay on mobile:', e));
                document.getElementById('scrollIndicator').style.display = 'none';
            }

            // Animações Iniciais de Entrada Sensação Premium (Cubic-bezier na pipeline do GSAP)
            const tl = gsap.timeline();

            // Entrada do texto (FadeIn + translateY leve)
            tl.to('.gsap-reveal', {
                y: 0,
                opacity: 1,
                duration: 1.2,
                stagger: 0.15,
                ease: "power3.out",
                delay: 0.2
            });

            // Entrada do produto c/ efeito de escala
            tl.to('.hero-product-img', {
                y: 0,
                opacity: 1,
                scale: 1,
                duration: 1.5,
                ease: "power4.out",
                onComplete: () => {
                    // Adiciona float independente pós-entrada
                    document.querySelector('.hero-product-img').classList.add('product-float');
                    document.getElementById('scrollIndicator').classList.add('visible');
                }
            }, "-=1");

            // LÓGICA DO VÍDEO COMPORTAMENTO SCROLL-DRIVEN (Apple Style)
            if (!isMobile) {
                let videoDuration = 0;
                let targetTime = 0;
                let currentTime = 0;
                let reqAnimFrame;

                video.addEventListener('loadedmetadata', function () {
                    videoDuration = video.duration;

                    // Conectar scroll com TargetTime temporal do Vídeo
                    ScrollTrigger.create({
                        trigger: document.body,
                        start: "top top",
                        end: "bottom bottom",
                        onUpdate: (self) => {
                            // Interrupção um pouco antes do frame final p/ não piscar em certos browsers (95%)
                            targetTime = self.progress * (videoDuration * 0.95);
                        }
                    });

                    // Loop de Renderização: Movimento extremamente suave com Lerp (Linear Interpolation) 
                    // e requestAnimationFrame garantindo performance no browser
                    function render() {
                        currentTime += (targetTime - currentTime) * 0.08; // Factor de smoothness

                        if (Math.abs(video.currentTime - currentTime) > 0.01) {
                            video.currentTime = currentTime;
                        }

                        reqAnimFrame = requestAnimationFrame(render);
                    }

                    render();
                });

                // Forçar load de metadata caso CACHE tenha engolido o evento
                if (video.readyState >= 1) {
                    let event = new Event('loadedmetadata');
                    video.dispatchEvent(event);
                }

                // Efeito Parallax Sensível dos elementos independentes do vídeo
                gsap.to('.hero-text-wrapper', {
                    y: -80,
                    opacity: 0,
                    ease: "none",
                    scrollTrigger: {
                        trigger: document.body,
                        start: "top top",
                        end: "+=120vh",
                        scrub: 1 // Suavização extra no scroll
                    }
                });

                gsap.to('.hero-product-img', {
                    y: -120,
                    ease: "none",
                    scrollTrigger: {
                        trigger: document.body,
                        start: "top top",
                        end: "+=150vh",
                        scrub: 1
                    }
                });

                gsap.to('#scrollIndicator', {
                    opacity: 0,
                    ease: "none",
                    scrollTrigger: {
                        trigger: document.body,
                        start: "top top",
                        end: "+=20vh",
                        scrub: true
                    }
                });
            }
        });
    </script>
</body>

</html>
